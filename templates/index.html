<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Ferry</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛴️</text></svg>">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#00643c">
    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Next Ferry">
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/style.css?v={{ asset_version }}">
    <!-- Leaflet CSS for mapping -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Chart.js for predictions dashboard -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <!-- HTMX - this is the magic! -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Ferry arrival alerts -->
    <script src="/static/alerts.js?v={{ asset_version }}" defer></script>
</head>
<body>
    <header>
        <h1>When's the Next Ferry?</h1>
    </header>

    <!-- Tab Navigation using HTMX -->
    <nav class="tab-nav">
        <button class="tab-button active" 
                hx-get="/sailings-tab" 
                hx-target="#tab-content"
                onclick="setActiveTab(this)">
            Next Sailings
        </button>
        <button class="tab-button"
                hx-get="/map-tab"
                hx-target="#tab-content"
                onclick="setActiveTab(this)">
            Map
        </button>
        <button class="tab-button"
                hx-get="/predictions-tab"
                hx-target="#tab-content"
                onclick="setActiveTab(this)">
            Predictions
        </button>
    </nav>

    <!-- Main content area where tabs will be loaded -->
    <div id="tab-content" 
         hx-get="/sailings-tab" 
         hx-trigger="load">
        <!-- Loading state - HTMX will replace this -->
        <div class="loading-state">
            <div>Loading...</div>
        </div>
    </div>
    {% if is_replay %}
    <!-- Replay control bar -->
    <div id="replay-bar">
        <span id="replay-label">REPLAY</span>
        <button id="replay-back" onclick="replayStep('back')">&larr;</button>
        <span id="replay-position">{{ replay_info.index + 1 }} / {{ replay_info.total }}</span>
        <button id="replay-forward" onclick="replayStep('advance')">&rarr;</button>
        <span id="replay-time">{{ replay_info.captured_at }}</span>
    </div>
    {% endif %}

    <!-- Leaflet JavaScript for mapping -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Register service worker for PWA installability
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }

        // Simple tab switching function
        function setActiveTab(clickedButton) {
            // Remove active class from all tab buttons
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            // Add active class to clicked button
            clickedButton.classList.add('active');
        }

        {% if is_replay %}
        // Replay mode: step through snapshots with arrow keys or buttons
        async function replayStep(direction) {
            const url = '/replay/' + direction;
            try {
                const resp = await fetch(url, { method: 'POST' });
                const data = await resp.json();
                if (data.error && !data.index && data.index !== 0) return;

                document.getElementById('replay-position').textContent =
                    (data.index + 1) + ' / ' + data.total;
                document.getElementById('replay-time').textContent = data.captured_at;

                // Refresh the sailings view
                const target = document.getElementById('sailings-content');
                if (target) htmx.trigger(target, 'load');
            } catch (e) {
                console.error('Replay step failed:', e);
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') { e.preventDefault(); replayStep('advance'); }
            if (e.key === 'ArrowLeft')  { e.preventDefault(); replayStep('back'); }
        });
        {% endif %}
    </script>
</body>
</html>
