<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Prediction Issue</title>
    <link rel="stylesheet" href="/static/style.css?v={{ asset_version }}">
</head>
<body>
    <div class="next-sailings-container">
        <div class="route-section">
            <h1 class="route-title">Report prediction issue</h1>
            <div class="vessel-live-info">
                <p class="detail-item">
                    Your report is ready with the current sailing and prediction context.
                </p>
                <p class="detail-item">
                    <a class="alert-btn report-btn" href="{{ issue_url }}" rel="noopener">
                        Continue to GitHub
                    </a>
                </p>
                <p class="detail-item">
                    <a href="/">Back to Next Ferry</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
