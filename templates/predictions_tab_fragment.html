<!-- Predictions Dashboard Tab -->
<div class="dashboard-container">
    <div id="dashboard-content" class="dashboard-grid">
        <div class="loading-state">
            <div>Loading predictions data...</div>
        </div>
    </div>
</div>

<script>
(function() {
    const ROUTE_LABELS = { 'sea-bi': 'Seattle - Bainbridge', 'ed-king': 'Kingston - Edmonds' };
    const DOW_LABELS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const OCEAN_DEEP = '#1e3a8a';
    const OCEAN_SURFACE = '#3b82f6';
    const WAVE_FOAM = '#e0f2fe';
    const SUCCESS_GREEN = '#10b981';
    const DANGER_RED = '#ef4444';
    const DECK_GRAY = '#64748b';

    const chartDefaults = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { display: false },
            tooltip: {
                backgroundColor: 'rgba(10, 22, 40, 0.9)',
                titleFont: { size: 13 },
                bodyFont: { size: 12 },
                cornerRadius: 8,
                padding: 10,
            },
        },
        scales: {
            x: {
                grid: { display: false },
                ticks: { color: DECK_GRAY, font: { size: 11 } },
            },
            y: {
                grid: { color: 'rgba(0,0,0,0.05)' },
                ticks: { color: DECK_GRAY, font: { size: 11 } },
            },
        },
    };

    function mergeOpts(overrides) {
        return JSON.parse(JSON.stringify({...chartDefaults, ...overrides}));
    }

    fetch('/predictions-data')
        .then(r => r.json())
        .then(data => render(data))
        .catch(() => {
            document.getElementById('dashboard-content').innerHTML =
                '<div class="loading-state"><div>Unable to load dashboard data.</div></div>';
        });

    function render(data) {
        const container = document.getElementById('dashboard-content');

        // Build the dashboard HTML structure
        let html = '';

        // Model status + error curve
        const model = data.model;
        if (model.is_trained && model.evaluation && model.evaluation.error_by_horizon) {
            const ev = model.evaluation;
            html += `
            <div class="dash-card dash-card-wide">
                <div class="dash-card-header">Prediction Error by Time to Departure</div>
                <div class="dash-card-body">
                    <div class="chart-wrap chart-wrap-tall"><canvas id="chart-horizon"></canvas></div>
                    <div class="stat-meta" style="margin-top: var(--sm)">
                        Overall: ${ev.overall_mae} min MAE, ${ev.overall_mean_error > 0 ? '+' : ''}${ev.overall_mean_error} min bias
                        ${ev.improvement_pct !== undefined ? ` &middot; ${ev.improvement_pct}% better than flat propagation` : ''}
                        &middot; ${data.event_count.toLocaleString()} sailings
                    </div>
                </div>
            </div>`;
        } else {
            html += `
            <div class="dash-card dash-card-wide">
                <div class="dash-card-header">Model Status</div>
                <div class="dash-card-body">
                    <div class="stat-meta">${data.event_count.toLocaleString()} sailings tracked. Model not yet trained.</div>
                </div>
            </div>`;
        }

        // Delay distribution
        html += `
        <div class="dash-card">
            <div class="dash-card-header">Delay Distribution</div>
            <div class="dash-card-body"><div class="chart-wrap"><canvas id="chart-distribution"></canvas></div></div>
        </div>`;

        // Delays by route
        html += `
        <div class="dash-card">
            <div class="dash-card-header">Average Delay by Route</div>
            <div class="dash-card-body"><div class="chart-wrap"><canvas id="chart-route"></canvas></div></div>
        </div>`;

        // Delays by day of week
        html += `
        <div class="dash-card">
            <div class="dash-card-header">Average Delay by Day of Week</div>
            <div class="dash-card-body"><div class="chart-wrap"><canvas id="chart-dow"></canvas></div></div>
        </div>`;

        // Delays by hour
        html += `
        <div class="dash-card">
            <div class="dash-card-header">Average Delay by Hour</div>
            <div class="dash-card-body"><div class="chart-wrap"><canvas id="chart-hour"></canvas></div></div>
        </div>`;

        // On-time trend
        if (data.daily_trend.length > 1) {
            html += `
            <div class="dash-card dash-card-wide">
                <div class="dash-card-header">On-Time Performance Trend</div>
                <div class="dash-card-body"><div class="chart-wrap"><canvas id="chart-trend"></canvas></div></div>
            </div>`;
        }

        container.innerHTML = html;

        // --- Render charts ---

        // Prediction error by horizon (line chart with CI band)
        if (model.is_trained && model.evaluation && model.evaluation.error_by_horizon) {
            const horizon = model.evaluation.error_by_horizon;
            const labels = horizon.map(d => d.minutes_out + 'm');
            const maeValues = horizon.map(d => d.mae);
            const biasValues = horizon.map(d => d.mean_error);
            const ciUpper = horizon.map(d => d.mae + (d.ci_upper || 0));
            const ciLower = horizon.map(d => Math.max(0, d.mae - (d.ci_lower || 0)));

            new Chart(document.getElementById('chart-horizon'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '70% CI Upper',
                            data: ciUpper,
                            borderColor: 'transparent',
                            backgroundColor: 'rgba(30, 58, 138, 0.08)',
                            fill: '+1',
                            pointRadius: 0,
                            pointHitRadius: 0,
                            tension: 0.3,
                        },
                        {
                            label: '70% CI Lower',
                            data: ciLower,
                            borderColor: 'transparent',
                            backgroundColor: 'rgba(30, 58, 138, 0.08)',
                            fill: false,
                            pointRadius: 0,
                            pointHitRadius: 0,
                            tension: 0.3,
                        },
                        {
                            label: 'Avg Error (MAE)',
                            data: maeValues,
                            borderColor: OCEAN_DEEP,
                            backgroundColor: OCEAN_DEEP,
                            fill: false,
                            tension: 0.3,
                            pointRadius: 2,
                            pointHoverRadius: 5,
                            borderWidth: 2,
                        },
                        {
                            label: 'Bias',
                            data: biasValues,
                            borderColor: DANGER_RED,
                            backgroundColor: DANGER_RED,
                            borderDash: [4, 3],
                            tension: 0.3,
                            pointRadius: 2,
                            pointHoverRadius: 5,
                            borderWidth: 1.5,
                            fill: false,
                        },
                    ],
                },
                options: {
                    ...mergeOpts({}),
                    plugins: {
                        ...chartDefaults.plugins,
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                usePointStyle: true,
                                pointStyle: 'circle',
                                boxWidth: 6,
                                boxHeight: 6,
                                font: { size: 11 },
                                filter: function(item) {
                                    return item.text !== '70% CI Upper' && item.text !== '70% CI Lower';
                                },
                            },
                        },
                        tooltip: {
                            ...chartDefaults.plugins.tooltip,
                            filter: function(item) {
                                return item.dataset.label !== '70% CI Upper' && item.dataset.label !== '70% CI Lower';
                            },
                            callbacks: {
                                label: function(ctx) {
                                    const val = ctx.parsed.y;
                                    const sign = val >= 0 ? '+' : '';
                                    return `${ctx.dataset.label}: ${sign}${val.toFixed(1)} min`;
                                },
                            },
                        },
                    },
                    scales: {
                        ...chartDefaults.scales,
                        y: {
                            ...chartDefaults.scales.y,
                            title: { display: true, text: 'Error (minutes)', color: DECK_GRAY },
                        },
                        x: {
                            ...chartDefaults.scales.x,
                            title: { display: true, text: 'Time to Departure', color: DECK_GRAY },
                            ticks: {
                                ...chartDefaults.scales.x.ticks,
                                maxTicksLimit: 10,
                                autoSkip: true,
                            },
                        },
                    },
                },
            });
        }

        // Delay distribution
        if (data.delay_distribution.length > 0) {
            new Chart(document.getElementById('chart-distribution'), {
                type: 'bar',
                data: {
                    labels: data.delay_distribution.map(d => d.delay_bin),
                    datasets: [{
                        data: data.delay_distribution.map(d => d.count),
                        backgroundColor: data.delay_distribution.map(d =>
                            d.delay_bin <= 0 ? SUCCESS_GREEN : (d.delay_bin >= 5 ? DANGER_RED : OCEAN_SURFACE)
                        ),
                        borderRadius: 3,
                    }],
                },
                options: {
                    ...mergeOpts({}),
                    scales: {
                        ...chartDefaults.scales,
                        y: { ...chartDefaults.scales.y, title: { display: true, text: 'Sailings', color: DECK_GRAY } },
                        x: { ...chartDefaults.scales.x, title: { display: true, text: 'Delay (minutes)', color: DECK_GRAY } },
                    },
                },
            });
        }

        // By route
        if (data.delays_by_route.length > 0) {
            const routeColors = [OCEAN_DEEP, OCEAN_SURFACE, SUCCESS_GREEN, '#8b5cf6'];
            new Chart(document.getElementById('chart-route'), {
                type: 'bar',
                data: {
                    labels: data.delays_by_route.map(d => ROUTE_LABELS[d.route_abbrev] || d.route_abbrev),
                    datasets: [{
                        data: data.delays_by_route.map(d => d.avg_delay),
                        backgroundColor: data.delays_by_route.map((_, i) => routeColors[i % routeColors.length]),
                        borderRadius: 6,
                    }],
                },
                options: {
                    ...mergeOpts({}),
                    indexAxis: 'y',
                    scales: {
                        x: { ...chartDefaults.scales.x, title: { display: true, text: 'Avg Delay (min)', color: DECK_GRAY } },
                        y: { ...chartDefaults.scales.y, grid: { display: false } },
                    },
                },
            });
        }

        // By day of week
        if (data.delays_by_dow.length > 0) {
            new Chart(document.getElementById('chart-dow'), {
                type: 'bar',
                data: {
                    labels: data.delays_by_dow.map(d => DOW_LABELS[d.day_of_week]),
                    datasets: [{
                        data: data.delays_by_dow.map(d => d.avg_delay),
                        backgroundColor: OCEAN_SURFACE,
                        borderRadius: 6,
                    }],
                },
                options: {
                    ...mergeOpts({}),
                    scales: {
                        ...chartDefaults.scales,
                        y: { ...chartDefaults.scales.y, title: { display: true, text: 'Avg Delay (min)', color: DECK_GRAY } },
                    },
                },
            });
        }

        // By hour
        if (data.delays_by_hour.length > 0) {
            new Chart(document.getElementById('chart-hour'), {
                type: 'bar',
                data: {
                    labels: data.delays_by_hour.map(d => d.hour_of_day + ':00'),
                    datasets: [{
                        data: data.delays_by_hour.map(d => d.avg_delay),
                        backgroundColor: data.delays_by_hour.map(d =>
                            ((d.hour_of_day >= 6 && d.hour_of_day <= 9) || (d.hour_of_day >= 15 && d.hour_of_day <= 19))
                                ? OCEAN_DEEP : OCEAN_SURFACE
                        ),
                        borderRadius: 4,
                    }],
                },
                options: {
                    ...mergeOpts({}),
                    scales: {
                        ...chartDefaults.scales,
                        y: { ...chartDefaults.scales.y, title: { display: true, text: 'Avg Delay (min)', color: DECK_GRAY } },
                    },
                },
            });
        }

        // On-time trend
        if (data.daily_trend.length > 1 && document.getElementById('chart-trend')) {
            // Show last 30 days max for readability
            const trend = data.daily_trend.slice(-30);
            new Chart(document.getElementById('chart-trend'), {
                type: 'line',
                data: {
                    labels: trend.map(d => {
                        const dt = new Date(d.date + 'T00:00:00');
                        return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    }),
                    datasets: [{
                        label: 'On-Time %',
                        data: trend.map(d => d.on_time_pct),
                        borderColor: SUCCESS_GREEN,
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 2,
                        pointHoverRadius: 5,
                    }],
                },
                options: {
                    ...mergeOpts({}),
                    scales: {
                        ...chartDefaults.scales,
                        y: {
                            ...chartDefaults.scales.y,
                            title: { display: true, text: 'On-Time %', color: DECK_GRAY },
                            min: 0,
                            max: 100,
                        },
                    },
                },
            });
        }
    }
})();
</script>
